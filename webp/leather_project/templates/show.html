{% extends "base.html" %}

{% block content %}

<div class="p-4 rounded shadow" style="background:#dbeafe;">

<h2 class="text-primary mb-4">All Jackets</h2>

<table class="table table-bordered bg-white text-dark">
<tr>
<th>Name</th><th>Brand</th><th>Price</th><th>Stock</th><th>Actions</th>
</tr>

{% for j in data %}
<tr>
<td>{{ j.name }}</td>
<td>{{ j.brand }}</td>
<td>{{ j.price }}</td>
<td>{{ j.stock }}</td>

<td>
<a href="../delete?id={{j.j_id}}" class="btn btn-danger btn-sm">Delete</a>
<a href="../update?id={{j.j_id}}" class="btn btn-primary btn-sm">Update</a>
</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
